# Site settings
title: Minimal MJX
description: An easy way to train RL agents using MJX.
baseurl: "/minimal_mjx"
url: "https://dynamicmobility.github.io"

# Theme settings
remote_theme: just-the-docs/just-the-docs
color_scheme: dark

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com/dynamicmobility/minimal_mjx"

aux_links_new_tab: true

# Footer content
footer_content: "Copyright &copy; 2026 Dynamic Mobility. All Rights Reserved."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Navigation
nav_sort: case_insensitive

# Heading anchor links
heading_anchors: true

# External navigation links
nav_external_links:
  - title: GitHub
    url: https://github.com/dynamicmobility/minimal_mjx

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Code copy button
enable_copy_code_button: true

# Google Analytics (optional - uncomment and add your tracking ID)
# ga_tracking: UA-XXXXXXXX-X

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
